name: Build hierarchical docling-serve images

on:
  schedule:
    # Rebuild weekly on Mondays at 06:00 UTC, after upstream typically releases
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream image tag to build against (default: latest)"
        required: false
        default: "latest"

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_ORG: krrome

jobs:
  build:
    name: Build ${{ matrix.spec.upstream }} → ${{ matrix.spec.name }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        spec:
          - upstream: docling-project/docling-serve
            name: docling-serve-hierarchical
            platforms: linux/amd64,linux/arm64
            tag_latest: true
          - upstream: docling-project/docling-serve-cpu
            name: docling-serve-hierarchical-cpu
            platforms: linux/amd64,linux/arm64
            tag_latest: true
          - upstream: docling-project/docling-serve-cu128
            name: docling-serve-hierarchical-cu128
            platforms: linux/amd64,linux/arm64
            tag_latest: false
          - upstream: docling-project/docling-serve-cu130
            name: docling-serve-hierarchical-cu130
            platforms: linux/amd64,linux/arm64
            tag_latest: false

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve upstream tag
        id: upstream
        run: |
          TAG="${{ inputs.upstream_tag || 'latest' }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "base=ghcr.io/${{ matrix.spec.upstream }}:$TAG" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_ORG }}/${{ matrix.spec.name }}
          flavor: |
            latest=${{ matrix.spec.tag_latest }}
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=${{ steps.upstream.outputs.tag }}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          platforms: ${{ matrix.spec.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ steps.upstream.outputs.base }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          pull: true
